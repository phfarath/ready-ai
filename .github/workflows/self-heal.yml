name: Self-Heal Docs

# Manually-triggered (or scheduled) self-healing run. When the test runner
# detects UI drift and auto-heals, the publisher commits the healed files
# to a new branch and opens a PR against `dev`.
#
# Required secrets/inputs:
#   - DOC_PATH:          path to the docs.md to test (workflow input)
#   - TARGET_URL:        URL to test against (workflow input)
#   - OPENAI_API_KEY:    for the LLM calls (repo secret)
#   - (optional) COOKIES_JSON: JSON cookies blob for authenticated runs

on:
  workflow_dispatch:
    inputs:
      doc_path:
        description: "Path to the docs.md file to test"
        required: true
        default: "docs/docs.md"
      target_url:
        description: "URL to test the documentation against"
        required: true
      base_branch:
        description: "Base branch for the auto-heal PR"
        required: false
        default: "dev"
  schedule:
    # Daily at 03:00 UTC. Adjust or remove as needed.
    - cron: "0 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  self-heal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run self-healing doc test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Only exit codes 0 (passed) and 2 (drift detected — expected when a
        # PR is opened) are treated as success. Anything else (broken steps,
        # auth failure, runtime error) fails the job.
        run: |
          set +e
          python main.py test \
            --doc "${{ inputs.doc_path }}" \
            --url "${{ inputs.target_url }}" \
            --headless \
            --auto-heal \
            --open-pr \
            --pr-base-branch "${{ inputs.base_branch }}" \
            --output ./test-report
          status=$?
          if [ "$status" -ne 0 ] && [ "$status" -ne 2 ]; then
            exit "$status"
          fi
          exit 0

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-heal-report
          path: ./test-report
          retention-days: 14
