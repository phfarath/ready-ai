name: Bug report
description: Report a reproducible problem in the open-source core
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please keep the report focused on one problem and include a minimal reproduction when possible.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and the impact.
      placeholder: The run fails after login and never reaches the dashboard step.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: The agent should continue to the dashboard and generate the next screenshots.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest sequence that reproduces the issue.
      placeholder: |
        1. Run `python main.py run ...`
        2. Use a login flow with ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: main@abc1234
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, model provider, and Chrome version if relevant.
      placeholder: macOS 15, Python 3.11, OpenAI, Chrome 123
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste sanitized logs only. Do not include secrets, cookies, or customer data.
    validations:
      required: false
